# ~/.config/helix/config.toml
theme = "selenized_dark"

[editor]
line-number = "relative"
mouse = true
cursorline = true
color-modes = true            # mode-aware status line colors
true-color = true             # force truecolor (terminals sometimes mis-detect)
bufferline = "multiple"
rulers = [120]                # matches your Zed preferred_line_length
text-width = 120

[editor.cursor-shape]
insert = "bar"                # matches Ghostty / Zed bar cursor
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[editor.file-picker]
hidden = false                # show dotfiles in the picker

[editor.indent-guides]
render = true
character = "┊"

[editor.lsp]
display-messages = true

[keys.normal]
# space-w to write, space-q to quit — small friendly additions
