# Selenized Light for Helix — palette values from the canonical Selenized spec.
"ui.background" = { bg = "bg_0" }
"ui.text" = "fg_0"
"ui.text.focus" = "fg_1"
"ui.cursor" = { fg = "bg_0", bg = "fg_0" }
"ui.cursor.primary" = { fg = "bg_0", bg = "blue" }
"ui.cursor.match" = { fg = "yellow", modifiers = ["underlined"] }
"ui.cursorline.primary" = { bg = "bg_1" }
"ui.selection" = { bg = "bg_2" }
"ui.selection.primary" = { bg = "bg_2" }
"ui.linenr" = "bg_2"
"ui.linenr.selected" = "fg_0"
"ui.statusline" = { fg = "fg_0", bg = "bg_1" }
"ui.statusline.inactive" = { fg = "dim_0", bg = "bg_1" }
"ui.statusline.normal" = { fg = "bg_0", bg = "blue", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg_0", bg = "green", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg_0", bg = "magenta", modifiers = ["bold"] }
"ui.help" = { fg = "fg_0", bg = "bg_1" }
"ui.popup" = { fg = "fg_0", bg = "bg_1" }
"ui.window" = { fg = "bg_2" }
"ui.menu" = { fg = "fg_0", bg = "bg_1" }
"ui.menu.selected" = { fg = "fg_1", bg = "bg_2" }
"ui.virtual.ruler" = { bg = "bg_1" }
"ui.virtual.whitespace" = "bg_2"
"ui.virtual.indent-guide" = "bg_2"
"ui.virtual.inlay-hint" = { fg = "dim_0" }

"comment" = { fg = "dim_0", modifiers = ["italic"] }
"variable" = "fg_0"
"variable.builtin" = "orange"
"variable.parameter" = "fg_0"
"constant" = "cyan"
"constant.numeric" = "magenta"
"constant.character.escape" = "dim_0"
"string" = "cyan"
"string.regexp" = "orange"
"string.special" = "orange"
"keyword" = { fg = "green", modifiers = ["italic"] }
"keyword.control" = { fg = "green", modifiers = ["italic"] }
"operator" = "green"
"function" = "blue"
"function.builtin" = "blue"
"function.macro" = "orange"
"type" = "yellow"
"type.enum.variant" = "blue"
"constructor" = "blue"
"label" = "blue"
"namespace" = "fg_0"
"attribute" = "blue"
"tag" = "red"
"punctuation" = "dim_0"
"special" = "orange"

"diff.plus" = "green"
"diff.minus" = "red"
"diff.delta" = "yellow"

"diagnostic.error" = { underline = { color = "red", style = "curl" } }
"diagnostic.warning" = { underline = { color = "orange", style = "curl" } }
"diagnostic.info" = { underline = { color = "blue", style = "curl" } }
"diagnostic.hint" = { underline = { color = "cyan", style = "curl" } }
"error" = "red"
"warning" = "orange"
"info" = "blue"
"hint" = "cyan"

"markup.heading" = { fg = "orange", modifiers = ["bold"] }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.link.url" = { fg = "violet", modifiers = ["underlined"] }
"markup.link.text" = "blue"
"markup.raw" = "cyan"

[palette]
bg_0  = "#fbf3db"
bg_1  = "#ece3cc"
bg_2  = "#d5cdb6"
dim_0 = "#909995"
fg_0  = "#53676d"
fg_1  = "#3a4d53"
red     = "#d2212d"
green   = "#489100"
yellow  = "#ad8900"
blue    = "#0072d4"
magenta = "#ca4898"
cyan    = "#009c8f"
orange  = "#c25d1e"
violet  = "#8762c6"
